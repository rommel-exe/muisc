name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: mac-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: mac-electron-
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Ensure release is published (not draft)
        shell: bash
        run: |
          if gh release view "${{ github.ref_name }}" --json isDraft --jq .isDraft 2>/dev/null; then
            echo "Release exists as draft, publishing..."
            gh release edit "${{ github.ref_name }}" --draft=false
          elif gh release view "${{ github.ref_name }}" 2>/dev/null; then
            echo "Release already exists and is published"
          else
            echo "Creating new release..."
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "" --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-windows:
    needs: publish-mac
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: win-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: win-electron-
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Ensure release is published (not draft)
        shell: bash
        run: |
          if gh release view "${{ github.ref_name }}" --json isDraft --jq .isDraft 2>/dev/null; then
            echo "Release exists as draft, publishing..."
            gh release edit "${{ github.ref_name }}" --draft=false
          elif gh release view "${{ github.ref_name }}" 2>/dev/null; then
            echo "Release already exists and is published"
          else
            echo "Creating new release..."
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "" --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
