name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # macOS publishes first — creates the GitHub release + uploads macOS artifacts
  publish-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: mac-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: mac-electron-
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Create GitHub Release
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          echo "Creating release with tag: $TAG"
          gh release create "$TAG" --title "$TAG" --notes "" --draft || echo "Note: release may already exist"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows depends on macOS — release already exists, just uploads
  publish-windows:
    needs: publish-mac
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: win-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: win-electron-
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
